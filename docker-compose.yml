services:
  mocker:
    build: .
    image: openfn-mocker
    container_name: openfn-mocker
    ports:
      - "4000:4000"
    environment:
      - MOCKER_LOG_LEVEL=info
      # Change the single listen port (all systems are mounted beneath it):
      # - MOCKER_PORT=8080
      # Run only a subset of systems (comma-separated):
      # - MOCKER_SYSTEMS=dhis2,mailgun,http-generic
    restart: unless-stopped
