# openfn-mocker configuration
# The whole mock listens on ONE port and mounts each system at /<name>. Point an
# OpenFn credential's base-URL field at http://localhost:<port>/<name> to test
# against it (e.g. http://localhost:4000/dhis2). Override the port with $PORT
# (Railway/PaaS convention) or $MOCKER_PORT.
log_level: info
port: 4000

# Optional top-level defaults for simulated network behavior. Anything set here
# cascades onto every system that does not set its own; a per-system block wins,
# and `latency` is merged key-by-key so a system can override just one field.
# Left commented out, every system answers instantly and never fails (the
# historical behavior). See "Simulating stochastic behavior" in the README.
# latency:
#   mean_ms: 150        # average added delay per request
#   stddev_ms: 40       # Gaussian jitter around the mean
# error_rate: 0.0       # probability [0,1] of an injected failure response
# rate_limit:           # deterministic throttling: 429 once traffic exceeds...
#   max: 30             # ...this many requests per window
#   window_ms: 1000     # window length (fixed-window counter, resets each window)

systems:
  dhis2:
    enabled: true
    version: "2.39"
    # Example: make DHIS2 feel like a busy, occasionally-flaky remote instance.
    latency:
      mean_ms: 200
      stddev_ms: 60
      min_ms: 20
      max_ms: 1500
    error_rate: 0.02

  commcare:
    enabled: true
    domain: test-project
    app_id: abc123

  openmrs:
    enabled: true

  fhir:
    enabled: true
    variant: r4
    # Empty apiPath: the /fhir mount is the FHIR base, so resources are served at
    # /fhir/Patient (not /fhir/fhir/Patient).
    apiPath: ""

  http-generic:
    enabled: true

  # Salesforce is a disabled placeholder (no plugin in v1).
  salesforce:
    enabled: false

  kobotoolbox:
    enabled: true

  primero:
    enabled: true

  mailgun:
    enabled: true
    domain: sandbox-test.mailgun.org

  twilio:
    enabled: true
    account_sid: ACtest123456

  airtable:
    enabled: true
    base_id: appABC123

  # --- Additional Digital Public Goods OpenFn has adaptors for ---
  godata:
    enabled: true

  rapidpro:
    enabled: true

  odk:
    enabled: true

  openlmis:
    enabled: true

  openimis:
    enabled: true

  openspp:
    enabled: true

  opencrvs:
    enabled: true

  openelis:
    enabled: true

  cht:
    enabled: true

  openhim:
    enabled: true

  openboxes:
    enabled: true

  ihris:
    enabled: true
