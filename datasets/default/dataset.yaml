name: default
description: "The canonical openfn-mocker scenario: a public-health program in
  Sierra Leone. One coherent cast of people (Jane Doe, John Smith, Amina Kamara,
  and family) and places (Ngelehun, Bo, Kenema, Makeni, Freetown) recurs across
  every system: DHIS2 metadata, FHIR clinical resources, CommCare patient cases,
  OpenMRS records, Kobotoolbox field submissions, Primero child-protection
  cases, and the Mailgun / Twilio / Airtable operational tools that support
  them. Data is synthetic and safe to commit. This is the dataset CI tests run
  against and the Docker image ships with — keep it legible, stable, and
  covering every system."
systems:
  dhis2:
    description: Sierra Leone org-unit hierarchy (country -> region -> facility), a
      Child Programme, ANC data elements.
  fhir:
    description: R4 Patients/Encounters/Observations/Condition/Claim for the Sierra
      Leone cast, with valid cross-references.
  commcare:
    description: Patient-registration cases and form submissions in the test-project domain.
  openmrs:
    description: Patients mirrored as REST + FHIR records sharing UUIDs; vitals and
      diagnosis concepts.
  kobotoolbox:
    description: Household survey, clinic-visit, and water-point assets with field
      submissions.
  primero:
    description: Child-protection cases (CP-YYYY-NNN) and incidents (IN-YYYY-NNN).
  mailgun:
    description: Notification-email events and 7-day stats for a sandbox domain.
  twilio:
    description: Appointment/verification SMS messages and a couple of calls.
  airtable:
    description: "A clinic CRM: Contacts and Tasks tables."
